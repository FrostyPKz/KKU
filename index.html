<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>AI ตรวจจับท่าออกกำลังกาย OTAGO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; }
    canvas { border: 2px solid #333; margin-top: 20px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>AI ตรวจจับการออกกำลังกาย</h1>
  <p>กรุณายืนให้เต็มตัวหน้ากล้อง เพื่อตรวจจับข้อต่อร่างกาย</p>
  <p id="status">กำลังโหลดโมเดล AI...</p>

  <script>
    let video;
    let poseNet;
    let poses = [];

    function setup() {
      createCanvas(640, 480);
      video = createCapture(VIDEO);
      video.size(width, height);

      // โหลดโมเดล PoseNet
      poseNet = ml5.poseNet(video, modelReady);
      
      // เมื่อโมเดลตรวจจับท่าทางได้ ให้เก็บข้อมูลไว้ในตัวแปร poses
      poseNet.on('pose', function(results) {
        poses = results;
      });
      
      video.hide(); // ซ่อนวิดีโอต้นฉบับ เพื่อวาดลงบน Canvas แทน
    }

    function modelReady() {
      document.getElementById('status').innerText = 'โมเดลพร้อมทำงานแล้ว!';
    }

    function draw() {
      image(video, 0, 0, width, height);
      drawKeypoints();
      drawSkeleton();
      analyzeExercise();
    }

    // ฟังก์ชันวาดจุดบนข้อต่อร่างกาย
    function drawKeypoints() {
      for (let i = 0; i < poses.length; i++) {
        let pose = poses[i].pose;
        for (let j = 0; j < pose.keypoints.length; j++) {
          let keypoint = pose.keypoints[j];
          if (keypoint.score > 0.2) { // วาดจุดเมื่อ AI มั่นใจมากกว่า 20%
            fill(0, 255, 0);
            noStroke();
            ellipse(keypoint.position.x, keypoint.position.y, 12, 12);
          }
        }
      }
    }

    // ฟังก์ชันวาดเส้นเชื่อมข้อต่อ
    function drawSkeleton() {
      for (let i = 0; i < poses.length; i++) {
        let skeleton = poses[i].skeleton;
        for (let j = 0; j < skeleton.length; j++) {
          let partA = skeleton[j][0];
          let partB = skeleton[j][1];
          stroke(255, 0, 0);
          strokeWeight(3);
          line(partA.position.x, partA.position.y, partB.position.x, partB.position.y);
        }
      }
    }

    // พื้นที่สำหรับเขียน Logic ตรวจจับท่าออกกำลังกายเฉพาะ
    function analyzeExercise() {
     // สร้างตัวแปรเก็บสถานะการนับ (State Machine เบื้องต้น)
    let isKneeUp = false;
    let isLegKicked = false;
    let isLegSide = false;
    let isHeelUp = false;
    let isStanding = false;

    function analyzeExercise() {
      if (poses.length > 0) {
        let pose = poses[0].pose;
        
        // ดึงตำแหน่งของข้อต่อที่สำคัญ (แกน Y บนหน้าจอ ยิ่งค่าน้อย แปลว่ายิ่งอยู่สูง)
        let lHip = pose.leftHip;
        let rHip = pose.rightHip;
        let lKnee = pose.leftKnee;
        let rKnee = pose.rightKnee;
        let lAnkle = pose.leftAnkle;
        let rAnkle = pose.rightAnkle;
        let nose = pose.nose;

        // เช็คความมั่นใจของ AI (score > 0.5 คือ AI มั่นใจว่าจับจุดถูก)
        if (lHip.score > 0.5 && rHip.score > 0.5 && lKnee.score > 0.5) {
          
          // ---------------------------------------------------------
          // 1. Marching (ย่ำเท้า)
          // ---------------------------------------------------------
          // เงื่อนไข: เข่าข้างใดข้างหนึ่งต้องยกสูงขึ้นเข้าใกล้ระดับสะโพก
          let hipAverageY = (lHip.y + rHip.y) / 2;
          if (lKnee.y < hipAverageY + 50 || rKnee.y < hipAverageY + 50) {
             // ถ้าระดับเข่ายกสูงขึ้นใกล้สะโพก (ระยะห่างน้อยกว่า 50 พิกเซล)
             if (!isKneeUp) {
                 console.log("Marching: ตรวจพบการยกเข่า");
                 isKneeUp = true;
             }
          } else {
             isKneeUp = false; // เอาขาลง
          }

          // ---------------------------------------------------------
          // 2. Front Knee Strengthener (เตะขาไปด้านหน้า)
          // ---------------------------------------------------------
          // เงื่อนไข: ท่านั่ง (สะโพกและเข่าอยู่ระดับใกล้เคียงกัน) และข้อเท้าถูกยกขึ้นมาระดับเดียวกับเข่า
          let isSitting = Math.abs(hipAverageY - lKnee.y) < 100; // สะโพกกับเข่าอยู่แนวระนาบใกล้กัน
          if (isSitting && lAnkle.score > 0.5) {
             if (lAnkle.y < lKnee.y + 30) { 
                 // ข้อเท้ายกขึ้นมาใกล้ระดับหัวเข่า (เตะขาตรง)
                 if (!isLegKicked) {
                     console.log("Front Knee: ตรวจพบการเตะขาด้านหน้า");
                     isLegKicked = true;
                 }
             } else {
                 isLegKicked = false;
             }
          }

          // ---------------------------------------------------------
          // 3. Side Hip Strengthener (เตะขาออกด้านข้าง)
          // ---------------------------------------------------------
          // เงื่อนไข: ท่ายืน และข้อเท้าซ้าย-ขวา กางออกห่างจากกันในแกน X
          if (lAnkle.score > 0.5 && rAnkle.score > 0.5) {
             let ankleDistanceX = Math.abs(lAnkle.x - rAnkle.x);
             let hipDistanceX = Math.abs(lHip.x - rHip.x);
             
             // ถ้าระยะห่างข้อเท้ากว้างกว่าระยะสะโพกอย่างชัดเจน (เช่น กว้างกว่า 1.5 เท่า)
             if (ankleDistanceX > hipDistanceX * 1.5) {
                 if (!isLegSide) {
                     console.log("Side Hip: ตรวจพบการกางขาด้านข้าง");
                     isLegSide = true;
                 }
             } else {
                 isLegSide = false;
             }
          }

          // ---------------------------------------------------------
          // 4. Calf Raise (ยืนเขย่งปลายเท้า)
          // ---------------------------------------------------------
          // เงื่อนไข: ท่ายืน จุดจมูก (Nose) หรือสะโพก (Hip) ขยับสูงขึ้นในแกน Y แต่ข้อเท้ายังอยู่ตำแหน่งเดิม
          // *หมายเหตุ: การเขย่งอาจตรวจจับยากจากหน้ากล้องตรง ต้องใช้การเก็บค่า Y เริ่มต้นมาเทียบ
          let baseNoseY = 200; // สมมติว่าเก็บค่าจมูกตอนยืนปกติไว้ที่ตัวแปรนี้
          if (nose.score > 0.5 && nose.y < baseNoseY - 20) { // จมูกขยับสูงขึ้น 20 พิกเซล
             if (!isHeelUp) {
                 console.log("Calf Raise: ตรวจพบการเขย่ง");
                 isHeelUp = true;
             }
          } else {
             isHeelUp = false;
          }

          // ---------------------------------------------------------
          // 5. Sit to Stand (ลุก - นั่ง)
          // ---------------------------------------------------------
          // เงื่อนไข: ระยะห่างแนวตั้งระหว่างสะโพก (Hip) และเข่า (Knee) เปลี่ยนแปลง
          let distanceHipToKneeY = lKnee.y - lHip.y; 
          
          if (distanceHipToKneeY > 150) { 
             // ถ้าระยะห่างแกน Y มาก แปลว่ายืนตรง
             if (!isStanding) {
                 console.log("Sit to Stand: ยืนขึ้นแล้ว");
                 isStanding = true;
             }
          } else if (distanceHipToKneeY < 50) {
             // ถ้าระยะห่างแกน Y น้อย (สะโพกหย่อนลงมาใกล้เข่า) แปลว่ากำลังนั่ง
             if (isStanding) {
                 console.log("Sit to Stand: นั่งลงแล้ว");
                 isStanding = false;
             }
          }
        }
      }
    }
  </script>
</body>
</html>
